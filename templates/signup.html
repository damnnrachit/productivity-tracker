{% extends "base.html" %}

{% set active_page = "signup" %}
{% set page_title = "Sign Up" %}

{% block title %}Sign Up - Daily Productivity Tracker{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card stat-card">
        <div class="card-body p-4">
          <h5 class="card-title mb-3">Create account</h5>

          {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}

          <form action="{{ url_for('auth.signup') }}" method="post" class="vstack gap-3">
            <div>
              <label for="username" class="form-label">Username</label>
              <input id="username" name="username" value="{{ username }}" class="form-control" required />
            </div>
            <div>
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" name="password" class="form-control" required />
            </div>
            <div>
              <label for="confirm_password" class="form-label">Confirm password</label>
              <input id="confirm_password" type="password" name="confirm_password" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>

          <div class="mt-3">
            <span class="text-body-secondary">Already have an account?</span>
            <a href="{{ url_for('auth.login_page') }}">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
