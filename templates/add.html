<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Task - Daily Productivity Tracker</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
        margin: 0;
        padding: 24px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      .nav {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
      }
      .nav a {
        color: #e5e7eb;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #243044;
        background: #0f172a;
      }
      .nav a.active {
        background: #3b82f6;
        border-color: #3b82f6;
      }
      .card {
        background: #111827;
        border: 1px solid #243044;
        border-radius: 12px;
        padding: 16px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 10px 0;
        font-weight: 700;
      }
      .meta {
        color: #9ca3af;
        margin: 0 0 14px 0;
        font-size: 13px;
      }
      .error {
        background: rgba(220, 38, 38, 0.15);
        border: 1px solid rgba(220, 38, 38, 0.35);
        color: #fecaca;
        padding: 10px 12px;
        border-radius: 10px;
        margin: 0 0 14px 0;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      label {
        font-size: 13px;
        color: #cbd5e1;
      }
      input[type="text"],
      input[type="date"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2b3a55;
        background: #0b1220;
        color: #e5e7eb;
        outline: none;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        background: #3b82f6;
        color: #ffffff;
        cursor: pointer;
      }
      button.danger {
        background: #dc2626;
      }
      .subhint {
        color: #9ca3af;
        font-size: 13px;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }
        .nav {
          flex-wrap: wrap;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="nav">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('add_task_page') }}" class="active">Add</a>
        <a href="{{ url_for('review_page') }}">Review</a>
      </div>

      <div class="card">
        <h1>Add Task</h1>
        <div class="meta">Create a new task. Due date is optional.</div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('add_task') }}" method="post">
          <div>
            <label for="title">Task title</label>
            <input id="title" type="text" name="title" value="{{ title }}" placeholder="e.g., Write report" required />
          </div>

          <div>
            <label for="due_date">Due date</label>
            <input id="due_date" type="date" name="due_date" value="{{ due_date }}" />
          </div>

          <div class="btn-row">
            <button type="submit">Add</button>
            <a class="subhint" href="{{ url_for('home') }}">Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>

{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Add New Task</h2>

<form method="POST" class="card p-4 shadow-sm">
    
    <div class="mb-3">
        <label class="form-label">Task Description</label>
        <input type="text" name="task" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Add Task</button>

</form>

{% endblock %}
