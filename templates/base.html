<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Productivity Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .sidebar {
            height: 100vh;
            background: #111;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #ccc;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: white;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Tracker</h4>
            <a href="/">Dashboard</a>
            <a href="/add">Add Task</a>
            <a href="/review">Review</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Navbar -->
            <nav class="navbar bg-white shadow-sm mb-4 rounded">
                <div class="container-fluid">
                    <span class="navbar-brand">Productivity Dashboard 🚀</span>
                </div>
            </nav>

            {% block content %}{% endblock %}

        </div>

    </div>
</div>

</body>
</html>
