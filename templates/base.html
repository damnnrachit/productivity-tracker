<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Daily Productivity Tracker{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="bg-body-tertiary">
    <div class="container-fluid">
      <div class="row min-vh-100">
        <aside class="col-12 col-md-3 col-xl-2 sidebar p-0">
          <div class="d-flex flex-column h-100 p-3 p-md-4">
            <a href="{{ url_for('home') }}" class="d-flex align-items-center mb-4 text-decoration-none">
              <span class="fs-5 fw-bold text-white">ProdTracker</span>
            </a>
            <ul class="nav nav-pills flex-column gap-2">
              <li class="nav-item">
                <a href="{{ url_for('home') }}" class="nav-link {% if active_page == 'home' %}active{% endif %}">
                  Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('add_task_page') }}" class="nav-link {% if active_page == 'add' %}active{% endif %}">
                  Add Task
                </a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('review_page') }}" class="nav-link {% if active_page == 'review' %}active{% endif %}">
                  Review Tasks
                </a>
              </li>
            </ul>
            <div class="mt-auto small text-secondary pt-3">
              Stay focused, one task at a time.
            </div>
          </div>
        </aside>

        <div class="col-12 col-md-9 col-xl-10 p-0">
          <nav class="navbar navbar-expand bg-white border-bottom shadow-sm">
            <div class="container-fluid px-3 px-md-4">
              <span class="navbar-brand mb-0 h1 fs-6 fs-md-5">{{ page_title or 'Dashboard' }}</span>
              <span class="text-body-secondary small d-none d-sm-inline">Daily Productivity Tracker</span>
            </div>
          </nav>

          <main class="p-3 p-md-4">
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
