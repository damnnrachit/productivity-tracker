{% extends "base.html" %}

{% set active_page = "review" %}
{% set page_title = "Edit Task" %}

{% block title %}Edit Task - Daily Productivity Tracker{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card stat-card">
        <div class="card-body p-4">
          <h5 class="card-title">Edit task</h5>

          {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}

          <form action="{{ url_for('tasks.edit_task', index=index) }}" method="post" class="vstack gap-3">
            <div>
              <label for="title" class="form-label">Task title</label>
              <input id="title" type="text" name="title" value="{{ title }}" class="form-control" required />
            </div>

            <div>
              <label for="due_date" class="form-label">Due date</label>
              <input id="due_date" type="date" name="due_date" value="{{ due_date }}" class="form-control" />
            </div>

            <div>
              <label for="category" class="form-label">Category</label>
              <input id="category" type="text" name="category" value="{{ category }}" class="form-control" />
            </div>

            <div>
              <label for="priority" class="form-label">Priority</label>
              <select id="priority" name="priority" class="form-select">
                {% for p in priorities %}
                  <option value="{{ p }}" {% if p == priority %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <a href="{{ url_for('tasks.review_page') }}" class="btn btn-outline-secondary">Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
